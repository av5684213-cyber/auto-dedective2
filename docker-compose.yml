version: '3.8'

services:
  # ── Next.js Application ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aracikiyas-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/data/aracikiyas.db
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    volumes:
      - app-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/admin/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Redis Cache ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aracikiyas-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  app-data:
    driver: local
  redis-data:
    driver: local
